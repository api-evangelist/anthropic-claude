features:
  - name: Frontier Models
    description: >-
      Access to Claude Opus, Sonnet, and Haiku families of large language models
      with industry-leading reasoning, coding, and agentic capabilities.
  - name: Tool Use
    description: >-
      Define custom tools that Claude can invoke during conversations to call
      external APIs, query databases, or execute code.
  - name: Vision
    description: >-
      Multi-modal input supports images alongside text for analysis, OCR,
      diagrams, and document understanding.
  - name: Prompt Caching
    description: >-
      Cache large prompts (system instructions, documents, examples) to reduce
      cost and latency on subsequent requests.
  - name: Streaming
    description: >-
      Server-sent events stream responses token-by-token for low-latency
      interactive experiences.
  - name: Batch API
    description: >-
      Submit large batches of asynchronous requests at 50 percent discount with
      results delivered within 24 hours.
  - name: Files API
    description: >-
      Upload and reference files for use across Messages, batches, and
      computer-use sessions.
  - name: Computer Use
    description: >-
      Allow Claude to control a virtual computer (screenshots, mouse, keyboard)
      to complete multi-step tasks autonomously.
  - name: Extended Thinking
    description: >-
      Enable extended reasoning steps for harder problems with transparent
      thinking traces.
useCases:
  - name: AI Assistants and Chatbots
    description: >-
      Build conversational assistants for customer support, productivity, and
      knowledge work powered by Claude models.
  - name: Coding Agents
    description: >-
      Power software engineering agents that read, edit, run, and test code
      across large repositories.
  - name: Document Processing
    description: >-
      Extract, summarize, and analyze long documents using large context windows
      and vision capabilities.
  - name: Content Generation
    description: >-
      Generate marketing copy, technical writing, translations, and creative
      content at scale.
  - name: Agentic Workflows
    description: >-
      Orchestrate multi-step agent workflows using tool use, MCP servers, and
      computer use for end-to-end task automation.
integrations:
  - name: Amazon Bedrock
    description: Access Claude models via the AWS Bedrock API
  - name: Google Cloud Vertex AI
    description: Access Claude models via Google Cloud Vertex AI
  - name: Model Context Protocol
    description: Open protocol for connecting Claude to external tools and data sources
  - name: LangChain
    description: First-class LangChain integration for chains and agents
  - name: LlamaIndex
    description: Use Claude as the LLM for RAG and indexing workflows
