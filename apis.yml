aid: anthropic-claude
name: Anthropic Claude
description: >-
  Anthropic Claude is a family of frontier large language models (Opus, Sonnet,
  Haiku) accessible via the Anthropic API for building AI assistants, agents,
  and integrations. The API supports streaming chat completions, tool use,
  vision, prompt caching, batch processing, the Files API, computer use, and the
  Model Context Protocol, with authentication via x-api-key headers and a base
  URL at api.anthropic.com.
type: Index
